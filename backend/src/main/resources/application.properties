spring.application.name=backend

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/resilience?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:gopika2004}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Secret
app.jwtSecret=${JWT_SECRET:ResilienceSuperSecretKeyForJwtAuthenticationInThisDisasterSupportApplication2026}
app.jwtExpirationMs=86400000

# Cloudinary Config
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:demo}
cloudinary.api_key=${CLOUDINARY_API_KEY:your_api_key}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:your_api_secret}

server.port=${PORT:8080}
